<div class="form-page linye-page-panel">
  <h1 class="linye-page-title">{{ isEdit ? 'Demo 編集' : 'Demo 新規' }}</h1>
  <a routerLink="/kyotsu" class="linye-back-link">← 一覧へ戻る</a>

  @if (loading && !name) {
    <p>読み込み中...</p>
  } @else {
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    <form (ngSubmit)="submit()">
      <div class="linye-form-stack">
        <div class="linye-form-row">
          <div class="linye-form-row__label">
            名称<span class="linye-required">※必須</span>
          </div>
          <div class="linye-form-row__field">
            <input id="name" type="text" [(ngModel)]="name" name="name" required />
          </div>
        </div>
        <div class="linye-form-row">
          <div class="linye-form-row__label">説明</div>
          <div class="linye-form-row__field">
            <textarea id="desc" [(ngModel)]="description" name="description"></textarea>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="linye-btn-primary" [disabled]="loading">
          {{ isEdit ? '保存' : '作成' }}
        </button>
      </div>
    </form>
  }
</div>
