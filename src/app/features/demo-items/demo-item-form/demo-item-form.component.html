<div class="form-page">
  <h1>{{ isEdit ? '编辑' : '新增' }} Demo 项目</h1>
  <a routerLink="/">返回列表</a>

  @if (loading && !name) {
    <p>加载中...</p>
  } @else {
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    <form (ngSubmit)="submit()">
      <div>
        <label for="name">名称</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" required />
      </div>
      <div>
        <label for="desc">描述</label>
        <textarea id="desc" [(ngModel)]="description" name="description"></textarea>
      </div>
      <button type="submit" [disabled]="loading">{{ isEdit ? '保存' : '创建' }}</button>
    </form>
  }
</div>
